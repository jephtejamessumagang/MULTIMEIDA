<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About | IT Interstellar Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins', sans-serif;
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}


#stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}


nav{
    position:fixed;
    width:100%;
    padding:20px;
    text-align:center;
    background:rgba(15,23,42,0.8);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:1000;
}

nav a{
    color:#38bdf8;
    margin:0 25px;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:white;
}


.container{
    padding:140px 10% 60px;
    text-align:center;
}


h1{
    font-family:'Orbitron', sans-serif;
    font-size:40px;
    color:#00f5ff;
    margin-bottom:20px;
}

h2{
    margin-top:30px;
    color:#38bdf8;
}


.card{
    margin-top:40px;
    padding:40px;
    border-radius:20px;
    background:rgba(30,41,59,0.6);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 40px rgba(0,255,255,0.05);
    animation:fadeUp 1s ease forwards;
}


img, video, audio{
    width:100%;
    margin-top:15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
}


.links-section{
    padding:60px 10%;
    display:flex;
    justify-content:center;
}

.links-card{
    width:100%;
    max-width:700px;
    padding:40px;
    border-radius:20px;
    background:rgba(30,41,59,0.6);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 40px rgba(0,255,255,0.05);
    text-align:center;
    animation:fadeUp 1s ease forwards;
}

.external-link{
    display:block;
    margin:25px auto 0;
    padding:15px 30px;
    border-radius:50px;
    text-decoration:none;
    font-weight:500;
    color:#0f172a;
    background:linear-gradient(90deg,#00f5ff,#38bdf8);
    transition:0.3s ease;
}

.external-link:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px #00f5ff;
}


@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h1>About Me</h1>
    <p>
        This section describes my hobbies and interests. My hobbies help me improve my creativity 
        and technical skills, contributing to my growth as an IT student.
    </p>

    <div class="card">
        <h2>My Hobby</h2>
        <img src="hobby.jpg" alt="My Hobby">

        <h2>About Audio</h2>
        <audio controls src="about page explanation.mp3"></audio>
    </div>
</div>


<section class="links-section">
    <div class="links-card">
        <h2>Sci-Fi Movie</h2>

        <video controls>
            <source src="Avatar_ Fire and Ash  Official Trailer.mp4" type="video/mp4">
        </video>

        <a href="https://www.youtube.com/watch?v=nb_fFj_0rq8" 
           target="_blank" 
           class="external-link">
            Explore Sci-Fi Movies
        </a>
    </div>
</section>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let stars = [];
const starCount = 300;
let scrollOffset = 0;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

for(let i=0;i<starCount;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        z:Math.random()*canvas.width,
        speed:Math.random()*0.6 + 0.2
    });
}

window.addEventListener("scroll",()=>{
    scrollOffset = window.scrollY * 0.4;
});

function animate(){
    ctx.fillStyle="rgba(15,23,42,0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    stars.forEach(star=>{
        let k = 128.0 / star.z;
        let px = (star.x - canvas.width/2)*k + canvas.width/2;
        let py = (star.y - canvas.height/2)*k + canvas.height/2 + scrollOffset*(star.z/canvas.width);

        if(px>=0 && px<=canvas.width && py>=0 && py<=canvas.height){
            let size = (1 - star.z/canvas.width)*3;
            let glow = 0.5 + Math.random()*0.5;
            ctx.fillStyle=`rgba(255,255,255,${glow})`;
            ctx.beginPath();
            ctx.arc(px,py,size,0,Math.PI*2);
            ctx.fill();
        }

        star.z -= star.speed;
        if(star.z <= 0){
            star.z = canvas.width;
            star.x = Math.random()*canvas.width;
            star.y = Math.random()*canvas.height;
        }
    });

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
